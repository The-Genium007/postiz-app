# ==========================================================================
#  POSTIZ — Docker Compose compatible Dokploy
#
#  Configuration :
#    1. Dans Dokploy > Environment, definir au minimum :
#       - POSTIZ_URL        (ex: https://postiz.mondomaine.com)
#       - JWT_SECRET         (generer avec : openssl rand -hex 32)
#    2. Dans Dokploy > Domains, ajouter un domaine pointant sur le port 5000
#    3. Optionnel : ajouter un domaine pour temporal-ui sur le port 8080
#
#  Notes :
#    - Pas de container_name (requis par Dokploy pour les logs/metriques)
#    - Variables substituables via ${VAR:-default} depuis le .env Dokploy
#    - Pas de Stripe/paiement (usage personnel)
#    - ./dynamicconfig doit etre present dans le repo (commit)
# ==========================================================================

services:

  # ==========================================================
  # POSTIZ — Application principale
  # ==========================================================
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    restart: always
    environment:
      # --- URLs (a configurer dans Dokploy > Environment) ---
      MAIN_URL: ${POSTIZ_URL:-http://localhost:5000}
      FRONTEND_URL: ${POSTIZ_URL:-http://localhost:5000}
      NEXT_PUBLIC_BACKEND_URL: ${POSTIZ_URL:-http://localhost:5000}/api
      BACKEND_INTERNAL_URL: http://localhost:3000

      # --- Securite ---
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_generate_with_openssl_rand_hex_32}

      # --- Base de donnees ---
      DATABASE_URL: postgresql://${POSTGRES_USER:-postiz}:${POSTGRES_PASSWORD:-postiz-password}@postiz-postgres:5432/${POSTGRES_DB:-postiz}
      REDIS_URL: redis://postiz-redis:6379
      TEMPORAL_ADDRESS: temporal:7233

      # --- App ---
      IS_GENERAL: 'true'
      DISABLE_REGISTRATION: ${DISABLE_REGISTRATION:-false}
      RUN_CRON: 'true'
      API_LIMIT: ${API_LIMIT:-30}
      NX_ADD_PLUGINS: 'false'

      # --- Stockage local ---
      STORAGE_PROVIDER: local
      UPLOAD_DIRECTORY: /uploads
      NEXT_PUBLIC_UPLOAD_DIRECTORY: /uploads

      # --- Extension Chrome ---
      EXTENSION_ID: ${EXTENSION_ID:-icpokdlcikdmemjkeoojhocmhmehpaia}

      # --- AI (optionnel) ---
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      # --- Reseaux sociaux (configurer dans Dokploy > Environment) ---
      X_API_KEY: ${X_API_KEY:-}
      X_API_SECRET: ${X_API_SECRET:-}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      THREADS_APP_ID: ${THREADS_APP_ID:-}
      THREADS_APP_SECRET: ${THREADS_APP_SECRET:-}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID:-}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET:-}
      TIKTOK_CLIENT_ID: ${TIKTOK_CLIENT_ID:-}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET:-}
      PINTEREST_CLIENT_ID: ${PINTEREST_CLIENT_ID:-}
      PINTEREST_CLIENT_SECRET: ${PINTEREST_CLIENT_SECRET:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      DISCORD_BOT_TOKEN_ID: ${DISCORD_BOT_TOKEN_ID:-}
      SLACK_ID: ${SLACK_ID:-}
      SLACK_SECRET: ${SLACK_SECRET:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      MASTODON_URL: ${MASTODON_URL:-https://mastodon.social}
      MASTODON_CLIENT_ID: ${MASTODON_CLIENT_ID:-}
      MASTODON_CLIENT_SECRET: ${MASTODON_CLIENT_SECRET:-}
      BEEHIIVE_API_KEY: ${BEEHIIVE_API_KEY:-}
      BEEHIIVE_PUBLICATION_ID: ${BEEHIIVE_PUBLICATION_ID:-}
      DRIBBBLE_CLIENT_ID: ${DRIBBBLE_CLIENT_ID:-}
      DRIBBBLE_CLIENT_SECRET: ${DRIBBBLE_CLIENT_SECRET:-}

      # --- UI ---
      NEXT_PUBLIC_DISCORD_SUPPORT: ${NEXT_PUBLIC_DISCORD_SUPPORT:-}
      NEXT_PUBLIC_POLOTNO: ${NEXT_PUBLIC_POLOTNO:-}

    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    networks:
      - default
      - dokploy-network
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy

  # ==========================================================
  # POSTGRES — Base de donnees Postiz
  # ==========================================================
  postiz-postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postiz-password}
      POSTGRES_USER: ${POSTGRES_USER:-postiz}
      POSTGRES_DB: ${POSTGRES_DB:-postiz}
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ==========================================================
  # REDIS
  # ==========================================================
  postiz-redis:
    image: redis:7.2
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - postiz-redis-data:/data
    networks:
      - default

  # ==========================================================
  # TEMPORAL STACK — Avec Elasticsearch pour advanced visibility
  # ==========================================================
  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    restart: always
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    networks:
      - default
    expose:
      - 9200
    volumes:
      - temporal-es-data:/var/lib/elasticsearch/data

  temporal-postgresql:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${TEMPORAL_DB_PASSWORD:-temporal}
      POSTGRES_USER: ${TEMPORAL_DB_USER:-temporal}
    networks:
      - default
    expose:
      - 5432
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 3s
      retries: 3

  temporal:
    image: temporalio/auto-setup:1.28.1
    restart: always
    depends_on:
      temporal-postgresql:
        condition: service_healthy
      temporal-elasticsearch:
        condition: service_started
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${TEMPORAL_DB_USER:-temporal}
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD:-temporal}
      - POSTGRES_SEEDS=temporal-postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
      - TEMPORAL_NAMESPACE=default
    networks:
      - default
    expose:
      - 7233
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig

  # ==========================================================
  # TEMPORAL UI — Interface de debug pour les workflows
  # Ajouter un domaine dans Dokploy > Domains sur le port 8080
  # ==========================================================
  temporal-ui:
    image: temporalio/ui:2.34.0
    restart: always
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://127.0.0.1:3000
    networks:
      - default
      - dokploy-network

# ==========================================================
# VOLUMES
# ==========================================================
volumes:
  postgres-volume:
  postiz-redis-data:
  postiz-config:
  postiz-uploads:
  temporal-postgres-data:
  temporal-es-data:

# ==========================================================
# NETWORKS
# ==========================================================
networks:
  default:
    driver: bridge

  dokploy-network:
    external: true
