# ==========================================================================
#  POSTIZ — Docker Compose DEV (local uniquement)
#
#  Usage : docker compose -f docker-compose.dev.yaml up -d
#
#  Inclut des outils de debug (pgAdmin, RedisInsight, Temporal UI)
#  et expose les ports sur localhost pour le developpement.
#  L'app Postiz elle-meme tourne via pnpm (pas dans un conteneur).
# ==========================================================================

services:

  # ==========================================================
  # POSTGRES — Base de donnees Postiz
  # ==========================================================
  postiz-postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: postiz-local-pwd
      POSTGRES_USER: postiz-local
      POSTGRES_DB: postiz-db-local
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - postiz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postiz-local -d postiz-db-local"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ==========================================================
  # REDIS
  # ==========================================================
  postiz-redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    networks:
      - postiz-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ==========================================================
  # PGADMIN — Interface web pour PostgreSQL (dev only)
  # http://localhost:8081
  # ==========================================================
  postiz-pg-admin:
    image: dpage/pgadmin4:latest
    restart: always
    ports:
      - "8081:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - postiz-network

  # ==========================================================
  # REDIS INSIGHT — Interface web pour Redis (dev only)
  # http://localhost:5540
  # ==========================================================
  postiz-redisinsight:
    image: redis/redisinsight:latest
    restart: always
    ports:
      - "5540:5540"
    volumes:
      - redisinsight:/data
    networks:
      - postiz-network

  # ==========================================================
  # TEMPORAL STACK — Avec Elasticsearch (full features pour dev)
  # ==========================================================
  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    networks:
      - temporal-network
    expose:
      - 9200
    volumes:
      - temporal-es-data:/var/lib/elasticsearch/data

  temporal-postgresql:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    networks:
      - temporal-network
    expose:
      - 5432
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 3s
      retries: 3

  temporal:
    image: temporalio/auto-setup:1.28.1
    restart: always
    depends_on:
      temporal-postgresql:
        condition: service_healthy
      temporal-elasticsearch:
        condition: service_started
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
      - TEMPORAL_NAMESPACE=default
    networks:
      - temporal-network
    ports:
      - "7233:7233"
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig

  temporal-admin-tools:
    image: temporalio/admin-tools:1.28.1-tctl-1.18.4-cli-1.4.1
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    networks:
      - temporal-network
    stdin_open: true
    depends_on:
      - temporal
    tty: true

  # ==========================================================
  # TEMPORAL UI — http://localhost:8080
  # ==========================================================
  temporal-ui:
    image: temporalio/ui:2.34.0
    restart: always
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://127.0.0.1:3000
    networks:
      - temporal-network
    ports:
      - "8080:8080"

# ==========================================================
# VOLUMES
# ==========================================================
volumes:
  postgres-volume:
  redisinsight:
  temporal-postgres-data:
  temporal-es-data:

# ==========================================================
# NETWORKS
# ==========================================================
networks:
  postiz-network:
    driver: bridge
  temporal-network:
    driver: bridge
    name: temporal-network
